<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="طلب حذف حساب نيكس شات" />
  <meta name="theme-color" content="#0D0D1A" />
  <title>طلب حذف الحساب | NexChat – نيكس شات</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <article class="delete-account-page">
    <a href="index.html" class="back-link">← العودة للرئيسية</a>

    <h1>طلب حذف الحساب</h1>
    <p class="delete-intro">أدخل كود حسابك لإرسال طلب حذف الحساب.</p>

    <form id="deleteForm" class="delete-form" novalidate>
      <div class="form-group">
        <label for="userCode">كود الحساب</label>
        <input
          type="text"
          id="userCode"
          name="userCode"
          placeholder="NX-0000"
          autocomplete="off"
          required
        />
      </div>
      <button type="submit" class="btn btn-primary btn-submit">
        إرسال الطلب
      </button>
    </form>

    <div id="successMessage" class="success-message" hidden>
      <svg class="success-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <p>تم الإرسال</p>
    </div>
  </article>

  <script>
    (function () {
      const form = document.getElementById('deleteForm');
      const successMessage = document.getElementById('successMessage');

      form.addEventListener('submit', function (e) {
        e.preventDefault();
        form.hidden = true;
        successMessage.hidden = false;
      });
    })();
  </script>
</body>
</html>
